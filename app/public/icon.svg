<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#090c12"/>
    </radialGradient>
    <radialGradient id="head" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#6e7580"/>
      <stop offset="100%" stop-color="#44484f"/>
    </radialGradient>
    <radialGradient id="muzzle" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d0cfc8"/>
      <stop offset="100%" stop-color="#a8a79f"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="99" height="99" rx="19.5" fill="none" stroke="#00f5d4" stroke-width="0.4" opacity="0.18"/>

  <!-- Ears — round, set at top-sides -->
  <circle cx="26" cy="28" r="13" fill="#44484f"/>
  <circle cx="74" cy="28" r="13" fill="#44484f"/>
  <!-- Inner ear -->
  <circle cx="26" cy="28" r="7.5" fill="#5a2840" opacity="0.85"/>
  <circle cx="74" cy="28" r="7.5" fill="#5a2840" opacity="0.85"/>

  <!-- Head — broad round -->
  <ellipse cx="50" cy="60" rx="36" ry="34" fill="url(#head)"/>

  <!-- Forehead lighter patch -->
  <ellipse cx="50" cy="43" rx="22" ry="12" fill="#8a9099" opacity="0.5"/>

  <!-- BANDIT MASK — horizontal band across eyes -->
  <path d="M13 49
           Q13 37  28 38
           Q35 37  40 40
           Q45 37  50 37
           Q55 37  60 40
           Q65 37  72 38
           Q87 37  87 49
           Q87 59  72 57
           Q65 58  60 55
           Q55 59  50 59
           Q45 59  40 55
           Q35 58  28 57
           Q13 59  13 49 Z"
        fill="#0d1018"/>

  <!-- Eye glow halos -->
  <ellipse cx="33" cy="48" rx="11" ry="9" fill="#00f5d4" opacity="0.10" filter="url(#glow)"/>
  <ellipse cx="67" cy="48" rx="11" ry="9" fill="#00f5d4" opacity="0.10" filter="url(#glow)"/>

  <!-- Eye sclera dark -->
  <ellipse cx="33" cy="48" rx="7.5" ry="6.5" fill="#081510"/>
  <ellipse cx="67" cy="48" rx="7.5" ry="6.5" fill="#081510"/>

  <!-- Iris glowing teal -->
  <ellipse cx="33" cy="48" rx="5" ry="4.5" fill="#00c9ae" filter="url(#glow)"/>
  <ellipse cx="67" cy="48" rx="5" ry="4.5" fill="#00c9ae" filter="url(#glow)"/>
  <ellipse cx="33" cy="48" rx="4" ry="3.8" fill="#00f5d4"/>
  <ellipse cx="67" cy="48" rx="4" ry="3.8" fill="#00f5d4"/>

  <!-- Pupils — vertical slit -->
  <ellipse cx="33" cy="48" rx="1.5" ry="3.2" fill="#030808"/>
  <ellipse cx="67" cy="48" rx="1.5" ry="3.2" fill="#030808"/>

  <!-- Eye shine -->
  <ellipse cx="31.5" cy="46" rx="1.2" ry="0.8" fill="white" opacity="0.8"/>
  <ellipse cx="65.5" cy="46" rx="1.2" ry="0.8" fill="white" opacity="0.8"/>

  <!-- Cheek patches — lighter fur below mask -->
  <ellipse cx="29" cy="63" rx="12" ry="9" fill="#9aa0a8" opacity="0.4"/>
  <ellipse cx="71" cy="63" rx="12" ry="9" fill="#9aa0a8" opacity="0.4"/>

  <!-- Muzzle -->
  <ellipse cx="50" cy="70" rx="15" ry="12" fill="url(#muzzle)"/>

  <!-- Nose -->
  <ellipse cx="50" cy="65" rx="5.5" ry="3.8" fill="#0d1018"/>

  <!-- Philtrum + mouth -->
  <line x1="50" y1="68.8" x2="50" y2="73" stroke="#8a8880" stroke-width="1.1"/>
  <path d="M43 73 Q50 77 57 73" stroke="#8a8880" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="16" y1="66" x2="35" y2="68" stroke="#00f5d4" stroke-width="0.7" opacity="0.22"/>
  <line x1="16" y1="70" x2="35" y2="71" stroke="#00f5d4" stroke-width="0.7" opacity="0.18"/>
  <line x1="65" y1="68" x2="84" y2="66" stroke="#00f5d4" stroke-width="0.7" opacity="0.22"/>
  <line x1="65" y1="71" x2="84" y2="70" stroke="#00f5d4" stroke-width="0.7" opacity="0.18"/>
</svg>
